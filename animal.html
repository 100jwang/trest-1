<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동물상 테스트</title>
  <link rel="stylesheet" href="style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5872932427176122"
     crossorigin="anonymous"></script>
</head>
<body>
  <div class="top-nav">
    <a href="index.html" class="home-btn">🏠 홈으로</a>
    <button id="theme-btn" onclick="toggleTheme()">🌙 다크 모드</button>
  </div>

  <main class="container">
    <h1>🐶 나는 강아지상? 고양이상?</h1>
    <p>사진을 업로드하면 AI가 분석해줘요!</p>

    <input type="file" id="imageUpload" accept="image/*">
    <button class="recommend-btn" onclick="predictAnimal()">동물상 분석하기</button>

    <div id="loading" style="display:none; margin-top:20px;">🔍 분석 중...</div>
    <div id="resultArea" style="margin-top:20px;"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>
  <script src="shared.js"></script>
  <script src="animal-test.js"></script>
</body>
</html>
