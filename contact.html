<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제휴 문의</title>
  <link rel="stylesheet" href="style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5872932427176122"
     crossorigin="anonymous"></script>
</head>
<body>
  <div class="top-nav">
    <a href="index.html" class="home-btn">🏠 홈으로</a>
    <button id="theme-btn" onclick="toggleTheme()">🌙 다크 모드</button>
  </div>

  <main class="container">
    <h1>🤝 제휴 문의</h1>
    <p>아래 양식을 작성해주시면 검토 후 연락드리겠습니다.</p>

    <form action="https://formspree.io/f/mqaqgbgw" method="POST" style="max-width:500px; margin:20px auto; text-align:left;">
      <label>이름</label>
      <input type="text" name="name" required style="width:100%; padding:10px; margin-bottom:10px;">

      <label>이메일</label>
      <input type="email" name="email" required style="width:100%; padding:10px; margin-bottom:10px;">

      <label>문의 내용</label>
      <textarea name="message" rows="5" required style="width:100%; padding:10px; margin-bottom:10px;"></textarea>

      <button type="submit" class="recommend-btn">문의 보내기</button>
    </form>
  </main>

  <script src="shared.js"></script>
</body>
</html>
