<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지식 정보 허브 - 최신 이슈 & 상식</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .info-card {
      cursor: pointer;
      transition: transform 0.2s;
    }
    .info-card:hover {
      transform: translateY(-5px);
    }
    .info-category {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      background: #4a90e2;
      color: white;
      margin-bottom: 10px;
    }
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-content {
      background: #fff;
      color: #333;
      max-width: 800px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 40px;
      border-radius: 12px;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    [data-theme="dark"] .modal-content {
      background: #1e1e1e;
      color: #e0e0e0;
    }
    .close-modal {
      position: absolute;
      top: 20px; right: 20px;
      font-size: 2rem;
      cursor: pointer;
    }
    .article-body {
      line-height: 1.8;
      font-size: 1.1rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="top-nav">
    <a href="index.html" class="home-btn">🏠 홈으로</a>
    <button id="theme-btn" onclick="toggleTheme()">🌙 다크 모드</button>
  </div>

  <main class="container">
    <header class="community-header">
      <h1>📚 지식 정보 허브</h1>
      <p>IT, 시사, 과학, 건강 분야의 엄선된 고품질 지식을 전해드립니다.</p>
    </header>

    <div class="category-filter row-btns" style="margin-bottom: 20px; justify-content: center; display: flex; gap: 10px; flex-wrap: wrap;">
      <button class="recommend-btn filter-btn active" data-category="all">전체</button>
      <button class="recommend-btn secondary-btn filter-btn" data-category="IT">IT/기술</button>
      <button class="recommend-btn secondary-btn filter-btn" data-category="과학">과학</button>
      <button class="recommend-btn secondary-btn filter-btn" data-category="건강">건강/바이오</button>
      <button class="recommend-btn secondary-btn filter-btn" data-category="시사">시사/상식</button>
    </div>

    <div id="article-list" class="info-grid">
      <p>지식을 불러오는 중입니다...</p>
    </div>
  </main>

  <div id="article-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-links">
      <a href="index.html">홈</a>
      <a href="about.html">소개</a>
      <a href="privacy.html">개인정보처리방침</a>
      <a href="terms.html">이용약관</a>
    </div>
    <p>&copy; 2026 종합 서비스 대시보드. All rights reserved.</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
  <script src="info.js"></script>
</body>
</html>
